name: Release APK

on:
  push:
    tags:
      - "v*"
      - "V*"

jobs:
  release:
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:22.04
      options: --network ci-network

    steps:
      - name: Prepare APT and action runtime
        shell: bash
        run: |
          set -euo pipefail

          apt_get="apt-get"
          tee_cmd="tee"
          install_cmd="install"
          chmod_cmd="chmod"
          if command -v sudo >/dev/null 2>&1; then
            apt_get="sudo apt-get"
            tee_cmd="sudo tee"
            install_cmd="sudo install"
            chmod_cmd="sudo chmod"
          fi

          {
            echo 'Acquire::http::Proxy "http://apt-cacher-ng:3142";'
            echo 'Acquire::https::Proxy "http://apt-cacher-ng:3142";'
          } | $tee_cmd /etc/apt/apt.conf.d/01proxy >/dev/null

          $apt_get update
          $apt_get install -y --no-install-recommends ca-certificates curl git gnupg jq unzip

          needs_node=1
          if command -v node >/dev/null 2>&1; then
            node_major="$(node -p 'process.versions.node.split(".")[0]')"
            if [ "$node_major" -ge 20 ]; then
              needs_node=0
            fi
          fi

          if [ "$needs_node" -eq 1 ]; then
            $install_cmd -d -m 0755 /etc/apt/keyrings
            curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key \
              | gpg --dearmor \
              | $tee_cmd /etc/apt/keyrings/nodesource.gpg >/dev/null
            $chmod_cmd a+r /etc/apt/keyrings/nodesource.gpg
            echo 'deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main' \
              | $tee_cmd /etc/apt/sources.list.d/nodesource.list >/dev/null
            $apt_get update
            $apt_get install -y --no-install-recommends nodejs
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: https://github.com/android-actions/setup-android@v3

      - name: Validate release inputs
        shell: bash
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          GH_KEY: ${{ secrets.GH_KEY }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail

          for name in GH_KEY KEY_ALIAS KEY_PASSWORD KEYSTORE_BASE64 KEYSTORE_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: ${name}" >&2
              if [ "$name" = "GH_KEY" ]; then
                echo "GH_KEY must be available to this repository's workflow." >&2
                echo "For an owner/organization repository, add it under the repository or owner/organization Actions secrets, not only under personal user settings." >&2
              fi
              exit 1
            fi
          done

          for tool in base64 curl git jq; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "Missing required tool: ${tool}" >&2
              exit 1
            fi
          done

      - name: Fetch upstream PWA
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d trapmaster-upstream ]; then
            git clone --depth 1 --branch main https://github.com/firebadnofire/trapmaster.git trapmaster-upstream
          fi

          if [ ! -f trapmaster-upstream/index.html ]; then
            echo "trapmaster-upstream was fetched, but index.html is missing." >&2
            exit 1
          fi

      - name: Decode release keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          temp_dir="${RUNNER_TEMP:-${RUNNER_TMP:-/tmp}}"
          keystore_path="${temp_dir}/trapmaster-release.keystore"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"

      - name: Build release APK
        shell: bash
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          temp_dir="${RUNNER_TEMP:-${RUNNER_TMP:-/tmp}}"
          export RELEASE_KEYSTORE_PATH="${temp_dir}/trapmaster-release.keystore"
          if [ ! -f "$RELEASE_KEYSTORE_PATH" ]; then
            echo "Release keystore was not decoded at $RELEASE_KEYSTORE_PATH" >&2
            exit 1
          fi
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Prepare release asset
        shell: bash
        run: |
          set -euo pipefail

          tag="${FORGEJO_REF_NAME:-${GITHUB_REF_NAME:?Missing tag ref name}}"
          shopt -s nullglob
          apk_files=(app/build/outputs/apk/release/*.apk)

          if [ "${#apk_files[@]}" -ne 1 ]; then
            echo "Expected exactly one release APK, found ${#apk_files[@]}." >&2
            exit 1
          fi

          mkdir -p dist
          cp "${apk_files[0]}" "dist/trapmaster-${tag}.apk"

      - name: Publish Forgejo release
        shell: bash
        env:
          FORGEJO_TOKEN: ${{ forgejo.token }}
        run: |
          set -euo pipefail

          api_url="${FORGEJO_API_URL:-${GITHUB_API_URL:?Missing Forgejo API URL}}"
          repository="${FORGEJO_REPOSITORY:-${GITHUB_REPOSITORY:?Missing repository name}}"
          tag="${FORGEJO_REF_NAME:-${GITHUB_REF_NAME:?Missing tag ref name}}"
          token="${FORGEJO_TOKEN:-${GITHUB_TOKEN:?Missing Forgejo token}}"
          owner="${repository%%/*}"
          repo="${repository#*/}"
          asset_path="dist/trapmaster-${tag}.apk"
          release_name="Trapmaster ${tag}"
          release_body="Automated APK release for ${tag}."

          api_request() {
            local method="$1"
            local url="$2"
            shift 2
            curl --fail-with-body --silent --show-error \
              --request "$method" \
              --header "Authorization: token ${token}" \
              "$@" \
              "$url"
          }

          release_response="$(mktemp)"
          release_status="$(curl --silent --show-error \
            --output "$release_response" \
            --write-out "%{http_code}" \
            --header "Authorization: token ${token}" \
            "${api_url}/repos/${owner}/${repo}/releases/tags/${tag}")"

          if [ "$release_status" = "404" ]; then
            release_payload="$(jq -n \
              --arg tag "$tag" \
              --arg name "$release_name" \
              --arg body "$release_body" \
              '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false, hide_archive_links: false}')"
            release_json="$(api_request POST "${api_url}/repos/${owner}/${repo}/releases" \
              --header "Content-Type: application/json" \
              --data "$release_payload")"
          elif [ "$release_status" = "200" ]; then
            release_json="$(cat "$release_response")"
            release_id="$(printf '%s' "$release_json" | jq -r '.id')"
            release_payload="$(jq -n \
              --arg tag "$tag" \
              --arg name "$release_name" \
              --arg body "$release_body" \
              '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false, hide_archive_links: false}')"
            release_json="$(api_request PATCH "${api_url}/repos/${owner}/${repo}/releases/${release_id}" \
              --header "Content-Type: application/json" \
              --data "$release_payload")"
          else
            cat "$release_response" >&2
            echo "Failed to look up release for ${tag}: HTTP ${release_status}" >&2
            exit 1
          fi

          release_id="$(printf '%s' "$release_json" | jq -r '.id')"
          if [ -z "$release_id" ] || [ "$release_id" = "null" ]; then
            echo "Release response did not include an id." >&2
            exit 1
          fi

          asset_name="$(basename "$asset_path")"
          asset_name_encoded="$(jq -nr --arg value "$asset_name" '$value|@uri')"
          existing_asset_id="$(api_request GET "${api_url}/repos/${owner}/${repo}/releases/${release_id}/assets" \
            | jq -r --arg name "$asset_name" '.[] | select(.name == $name) | .id' \
            | head -n 1)"

          if [ -n "$existing_asset_id" ]; then
            api_request DELETE "${api_url}/repos/${owner}/${repo}/releases/${release_id}/assets/${existing_asset_id}" >/dev/null
          fi

          api_request POST "${api_url}/repos/${owner}/${repo}/releases/${release_id}/assets?name=${asset_name_encoded}" \
            --form "attachment=@${asset_path}" >/dev/null

      - name: Publish GitHub release
        shell: bash
        env:
          GH_KEY: ${{ secrets.GH_KEY }}
        run: |
          set -euo pipefail

          api_url="https://api.github.com"
          upload_url="https://uploads.github.com"
          owner="firebadnofire"
          repo="trapmaster-android"
          tag="${FORGEJO_REF_NAME:-${GITHUB_REF_NAME:?Missing tag ref name}}"
          token="${GH_KEY:?Missing GitHub token}"
          asset_path="dist/trapmaster-${tag}.apk"
          asset_name="$(basename "$asset_path")"
          asset_name_encoded="$(jq -nr --arg value "$asset_name" '$value|@uri')"
          release_name="Trapmaster ${tag}"
          release_body="Automated APK release for ${tag}."

          github_request() {
            local method="$1"
            local url="$2"
            local response_file
            local status
            shift 2
            response_file="$(mktemp)"
            status="$(curl --silent --show-error \
              --output "$response_file" \
              --write-out "%{http_code}" \
              --request "$method" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${token}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "$@" \
              "$url")"
            if [ "$status" -lt 200 ] || [ "$status" -gt 299 ]; then
              cat "$response_file" >&2
              echo "GitHub API request failed: ${method} ${url} returned HTTP ${status}" >&2
              exit 1
            fi
            cat "$response_file"
          }

          release_response="$(mktemp)"
          release_status="$(curl --silent --show-error \
            --output "$release_response" \
            --write-out "%{http_code}" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${token}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${api_url}/repos/${owner}/${repo}/releases/tags/${tag}")"

          if [ "$release_status" = "404" ]; then
            release_payload="$(jq -n \
              --arg tag "$tag" \
              --arg name "$release_name" \
              --arg body "$release_body" \
              '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false, make_latest: "true"}')"
            release_json="$(github_request POST "${api_url}/repos/${owner}/${repo}/releases" \
              --header "Content-Type: application/json" \
              --data "$release_payload")"
          elif [ "$release_status" = "200" ]; then
            release_json="$(cat "$release_response")"
            release_id="$(printf '%s' "$release_json" | jq -r '.id')"
            release_payload="$(jq -n \
              --arg tag "$tag" \
              --arg name "$release_name" \
              --arg body "$release_body" \
              '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false, make_latest: "true"}')"
            release_json="$(github_request PATCH "${api_url}/repos/${owner}/${repo}/releases/${release_id}" \
              --header "Content-Type: application/json" \
              --data "$release_payload")"
          else
            cat "$release_response" >&2
            echo "Failed to look up GitHub release for ${tag}: HTTP ${release_status}" >&2
            exit 1
          fi

          release_id="$(printf '%s' "$release_json" | jq -r '.id')"
          if [ -z "$release_id" ] || [ "$release_id" = "null" ]; then
            echo "GitHub release response did not include an id." >&2
            exit 1
          fi

          existing_asset_id="$(github_request GET "${api_url}/repos/${owner}/${repo}/releases/${release_id}/assets" \
            | jq -r --arg name "$asset_name" '.[] | select(.name == $name) | .id' \
            | head -n 1)"

          if [ -n "$existing_asset_id" ]; then
            github_request DELETE "${api_url}/repos/${owner}/${repo}/releases/assets/${existing_asset_id}" >/dev/null
          fi

          github_request POST "${upload_url}/repos/${owner}/${repo}/releases/${release_id}/assets?name=${asset_name_encoded}" \
            --header "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@${asset_path}" >/dev/null
